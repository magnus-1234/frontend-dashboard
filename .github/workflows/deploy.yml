name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=30 \
              ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
          set -e
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — $(date)"
          echo "================================================"

          # Try to find the bot directory
          for dir in "$HOME/app/bot" "$HOME/bot" "$HOME/WOS-BOT-1"; do
            if [ -d "$dir/.git" ]; then
              BOT_DIR="$dir"
              break
            fi
          done

          if [ -z "$BOT_DIR" ]; then
            echo "🔍 Searching with find..."
            BOT_DIR=$(find $HOME -name ".git" -type d -prune | head -n 1 | xargs -r dirname 2>/dev/null)
          fi

          if [ -z "$BOT_DIR" ]; then
            echo "❌ ERROR: Bot directory not found!"
            ls -R $HOME | head -n 20
            exit 1
          fi
          
          cd "$BOT_DIR"
          echo "📂 Directory: $(pwd)"

          # Pull latest code
          echo ""
          echo "📥 Pulling latest code..."
          git fetch origin main
          OLD=$(git rev-parse --short HEAD || echo "unknown")
          git reset --hard FETCH_HEAD
          NEW=$(git rev-parse --short HEAD || echo "unknown")
          echo "✅ Updated: $OLD → $NEW"

          # Update dependencies if requirements.txt changed
          if [ -f "requirements.txt" ]; then
            echo "📦 Checking dependencies..."
            if [ -f "venv/bin/pip" ]; then
              ./venv/bin/pip install -r requirements.txt
            else
              pip3 install -r requirements.txt || pip install -r requirements.txt
            fi
          fi

          # Restart bot
          echo ""
          echo "🔄 Restarting bot..."
          pm2 restart discordbot --update-env || pm2 start app.py --name discordbot
          echo "✅ Bot restarted"

          echo ""
          pm2 status
          echo ""
          echo "================================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "================================================"
          ENDSSH
