name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=30 \
              ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — $(date)"
          echo "================================================"

          # Find bot directory by looking for .git folder
          echo "🔍 Searching for bot directory..."
          BOT_DIR=$(find ~ -name ".git" -type d -prune | head -n 1 | xargs dirname 2>/dev/null)
          
          if [ -z "$BOT_DIR" ]; then
            echo "⚠️ Could not find .git directory with find. Trying common paths..."
            if [ -d "~/app/bot" ]; then
              BOT_DIR="~/app/bot"
            elif [ -d "~/bot" ]; then
              BOT_DIR="~/bot"
            else
              echo "❌ ERROR: Bot directory not found!"
              exit 1
            fi
          fi
          
          cd "$BOT_DIR"
          echo "📂 Directory: $(pwd)"

          # Pull latest code
          echo ""
          echo "📥 Pulling latest code..."
          # Ensure we are in a git repo
          if [ ! -d ".git" ]; then
            echo "❌ ERROR: $(pwd) is not a git repository!"
            exit 1
          fi
          
          git fetch origin main
          OLD=$(git rev-parse --short HEAD)
          git reset --hard origin/main
          NEW=$(git rev-parse --short HEAD)
          echo "✅ Updated: $OLD → $NEW — $(git log -1 --pretty=%s)"

          # Update dependencies if requirements.txt changed
          if git diff --name-only $OLD $NEW | grep -q "requirements.txt"; then
            echo "📦 requirements.txt changed. Installing dependencies..."
            if [ -d "venv" ]; then
              source venv/bin/activate
              pip install -r requirements.txt
            else
              pip install -r requirements.txt
            fi
            echo "✅ Dependencies updated"
          fi

          # Restart bot (always)
          echo ""
          echo "🔄 Restarting bot..."
          pm2 restart discordbot --update-env || pm2 start app.py --name discordbot
          echo "✅ Bot restarted"

          echo ""
          pm2 status
          echo ""
          echo "================================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "================================================"
          ENDSSH
